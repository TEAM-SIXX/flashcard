<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JD Flashcard Generator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Interview Prep Engine</h1>
            <div class="header-actions">
                <button id="theme-toggle">🌙 Theme</button>
                <button id="dashboard-btn">📊 Dashboard</button>
            </div>
        </header>

        <!-- View 1: Input JD -->
        <section id="view-input" class="view active">
            <div class="card">
                <h2>Paste Job Description</h2>
                <textarea id="jd-text" placeholder="Paste the full job description here..."></textarea>
                <div class="divider-text">OR</div>
                <input type="url" id="jd-url" placeholder="https://careers.company.com/job/123">
                <button id="analyze-btn" class="btn-primary">Extract Technologies</button>
            </div>
        </section>

        <!-- View 2: Tech Stack Results -->
        <section id="view-tech" class="view">
            <div class="card">
                <h2>Extracted Priority Path</h2>
                <div id="tech-list" class="tech-grid"></div>
                <button id="generate-deck-btn" class="btn-primary">Generate Study Deck</button>
            </div>
        </section>

        <!-- View 3: Study Deck (Flashcards) -->
        <section id="view-study" class="view">
            <div class="study-layout">
                <aside class="study-sidebar">
                    <h3>Study Tools</h3>
                    <div class="timer-container">
                        <div id="timer-display">25:00</div>
                        <button id="timer-btn">Start Pomodoro</button>
                    </div>
                    <input type="text" id="search-cards" placeholder="Search cards...">
                    <select id="filter-difficulty">
                        <option value="all">All Levels</option>
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                    <button id="export-btn" class="btn-secondary">Export Deck (JSON)</button>
                </aside>
                
                <main class="flashcard-area">
                    <div class="card-stats">
                        <span id="card-counter">Card 1 of 10</span>
                        <span id="card-tech-badge" class="badge">React</span>
                        <span id="card-diff-badge" class="badge">Advanced</span>
                    </div>
                    
                    <div class="flip-card" id="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <p id="card-front-text">Front of card</p>
                                <small class="hint">Press SPACE to flip</small>
                            </div>
                            <div class="flip-card-back">
                                <p id="card-back-text">Back of card</p>
                            </div>
                        </div>
                    </div>

                    <div class="actions">
                        <button id="bookmark-btn" class="btn-icon" title="Bookmark (B)">⭐</button>
                        <div class="confidence-rating">
                            <span>Rate: </span>
                            <button class="rate-btn" data-rating="1">1</button>
                            <button class="rate-btn" data-rating="2">2</button>
                            <button class="rate-btn" data-rating="3">3</button>
                            <button class="rate-btn" data-rating="4">4</button>
                            <button class="rate-btn" data-rating="5">5</button>
                        </div>
                        <button id="ai-gen-btn" class="btn-secondary">✨ Generate AI Cards for this Tech</button>
                    </div>
                    <div class="nav-arrows">
                        <button id="prev-btn">← Prev</button>
                        <button id="next-btn">Next →</button>
                    </div>
                </main>
            </div>
        </section>

        <!-- View 4: Dashboard -->
        <section id="view-dashboard" class="view">
            <div class="card">
                <h2>Progress Dashboard</h2>
                <div id="mastery-rings" class="dashboard-grid"></div>
                <h3>Weak Areas (Focus Here)</h3>
                <ul id="weak-areas"></ul>
            </div>
        </section>
    </div>

    <script src="js/utils/helpers.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components/jdInput.js"></script>
    <script src="js/components/techDisplay.js"></script>
    <script src="js/components/flashcardDeck.js"></script>
    <script src="js/components/studyStats.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
